name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: fmt / clippy / check / build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt check
        run: cargo fmt -- --check

      - name: Cargo clippy
        run: cargo clippy --features postgres,mysql,mssql,azure-auth -- -D warnings

      - name: Cargo check
        run: cargo check --features postgres,mysql,mssql,azure-auth

      - name: Build extension (all backends)
        run: cargo build --lib --features postgres,mysql,mssql,azure-auth

      - name: Build examples
        run: cargo build --examples --features postgres,mysql,mssql,azure-auth
