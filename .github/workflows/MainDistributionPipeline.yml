name: Main Extension Distribution Pipeline

on:
  push:
    branches:
      - main
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

jobs:
  duckdb-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      extension_name: rust_db_driver
      duckdb_version: v1.2.0
      ci_tools_version: main
      # Install Rust toolchain in all build environments
      extra_toolchains: 'rust'
      # Exclude WebAssembly (incompatible with Tokio async runtime) and
      # MinGW (MSVC is the supported Windows target for this crate)
      exclude_archs: 'wasm_mvp;wasm_eh;wasm_threads;windows_amd64_mingw;'
      opt_in_archs: 'windows_arm64;'
      build_duckdb_shell: false

  duckdb-deploy:
    name: Deploy extension binaries
    needs: duckdb-build
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_deploy.yml@main
    secrets: inherit
    with:
      extension_name: rust_db_driver
      duckdb_version: v1.2.0
      ci_tools_version: main
      exclude_archs: 'wasm_mvp;wasm_eh;wasm_threads;windows_amd64_mingw;'
      opt_in_archs: 'windows_arm64;'
      # Deploy to both latest/ and versioned/ paths when on main or a v* branch
      deploy_latest: ${{ startsWith(github.ref, 'refs/heads/v') || github.ref == 'refs/heads/main' }}
      deploy_versioned: ${{ startsWith(github.ref, 'refs/heads/v') || github.ref == 'refs/heads/main' }}
